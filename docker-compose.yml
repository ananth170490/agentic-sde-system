services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-sde-orchestrator
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    command: uvicorn orchestrator.api.main:app --host 0.0.0.0 --port 8000

  # If you want to serve generated_projects/url-shortener as a second service,
  # add another service block here that builds from that generated project and
  # exposes its app port.
